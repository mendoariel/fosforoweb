name: Deploy to Ferozo Host

on:
  push:
    branches:
      - main
    paths:
      - 'wep-page/**'
      - '.github/workflows/**'

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      - name: 📂 Sync files to Ferozo
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./wep-page/
          server-dir: /public_html/
          # excluye archivos que no deberían subir a producción
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env.local
            README.md
            Dockerfile*
            docker-compose*
            CREDENCIALES-BD.md
